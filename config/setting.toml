[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[flow]
labs_base_url = "https://labs.google/fx/api"
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
timeout = 120
max_retries = 4
image_request_timeout = 90
image_timeout_retry_count = 1
image_timeout_retry_delay = 0.8
image_timeout_use_media_proxy_fallback = true
image_prefer_media_proxy = true
image_slot_wait_timeout = 900
image_launch_soft_limit = 25
image_launch_wait_timeout = 900
image_launch_stagger_ms = 250
video_slot_wait_timeout = 480
video_launch_soft_limit = 20
video_launch_wait_timeout = 480
video_launch_stagger_ms = 250
poll_interval = 3.0
max_poll_attempts = 200

[server]
host = "0.0.0.0"
port = 18282

[debug]
enabled = true
log_requests = true
log_responses = true
mask_token = true

[proxy]
proxy_enabled = false
proxy_url = ""

[generation]
image_timeout = 300
video_timeout = 1500

[call_logic]
call_mode = "default"  # default=随机轮询策略, polling=顺序轮询策略
# 负载均衡时跳过剩余额度 <= 此值的账号（Pro 账号额度耗尽自动跳过）
min_credits_to_select = 1

[admin]
error_ban_threshold = 3
# Discord 运维告警 webhook URL。优先读环境变量 FLOW2API_ALERT_WEBHOOK_URL（密钥不进 git），留空则只记日志
alert_webhook_url = ""
# 可用账号池低水位阈值：活跃账号数 <= 此值时触发 Discord 告警
alert_pool_low_threshold = 2

[cache]
enabled = false
timeout = 7200  # 缓存超时时间(秒), 默认2小时
base_url = ""   # 缓存文件访问的基础URL, 留空则使用服务器地址

[watermark]
# Pro(TIER_ONE) 视频去水印: 调本机常驻 ProPainter 服务(见 dewatermark/)
enabled = true                           # 开关; 需先起 dewatermark 服务再设 true
service_url = "http://127.0.0.1:18290"   # 去水印服务地址(仅本机)
timeout_seconds = 120                    # 单条视频去水印超时(秒); 超时/失败则回退原视频

[captcha]
captcha_method = "personal"  # 打码方式: yescaptcha/browser/personal/remote_browser
browser_recaptcha_settle_seconds = 1.0  # 打码完成额外稳态等待，速度优先可设 1.0
browser_count = 1  # browser 模式的有头浏览器实例数量
personal_project_pool_size = 4  # personal 模式下单个 Token 默认维护的项目池数量

# personal 持久化 profile：把 nodriver 的 user-data-dir 固定到一个目录，
# 一次性用 GUI Chrome 登录 Google 账号后，后续打码自动带登录态 cookie，
# reCAPTCHA Enterprise 会把请求按"已登录账号"评分，显著降低 UNUSUAL_ACTIVITY。
# 启用前必须执行一次：
#   sudo systemctl stop flow2api
#   google-chrome --user-data-dir=/opt/flow2api-profiles/ultra
#   # 在弹出的 Chrome 里登录 Google 账号 → 访问 labs.google/fx/tools/flow → 关闭
#   sudo systemctl start flow2api
# 换账号同流程：停服 → GUI 登出旧账号登入新账号 → 启服。
persistent_profile_enabled = true
persistent_profile_path = "/opt/flow2api-profiles/ultra"

# 内置浏览器打码 (personal) 配置
# 每个项目(project_id)对应一个常驻标签页，标签页会被复用以提高性能
# 推荐配置（每个标签约占用200-300MB内存）：
# - 2GB内存: 3个标签
# - 4GB内存: 5个标签
# - 8GB内存: 10个标签
# - 16GB内存: 20个标签
# 注意：标签数量取决于不同项目的数量，单个项目的并发请求会复用同一个标签页
personal_max_resident_tabs = 5  # 最大常驻标签页数量
personal_idle_tab_ttl_seconds = 600  # 标签页空闲超时(秒)，超时后自动回收

yescaptcha_api_key = ""  # YesCaptcha API密钥
yescaptcha_base_url = "https://api.yescaptcha.com"
remote_browser_base_url = "http://127.0.0.1:8060"  # 本地 token 池服务地址
remote_browser_api_key = ""   # 本地 token 池服务 API Key
remote_browser_timeout = 35   # 远程有头打码请求超时(秒)

[token]
# ST 每日保活巡检：即使账号闲置也定时滚动续期 __Secure-next-auth.session-token
st_keepalive_enabled = true
st_keepalive_interval_hours = 24
# 浏览器 ST 刷新（旧机制）。多账号池下会写错号，默认关闭；单 Ultra 老部署可临时开
st_browser_refresh_enabled = false

[keepalive]
# 浏览器保活器（独立进程 flow2api-keepalive.service）。AT 直驱范式：
# 常驻 nodriver 浏览器定期刷新 labs.google flow 页，从 /fx/api/auth/session
# 拿新 AT(+rotated ST) 写库，主服务直接用活 AT，绕过"死 ST 换不出活 AT"的死结。
# 前置：每号需在 {browser_profile_base}/{token_id}/ profile 用 GUI 登录 Google 一次
# （建立持久 .google.com 主登录态——这是唯一人工依赖，崩溃/重启都靠它）。
browser_enabled = true
browser_interval_seconds = 1200   # 刷新间隔（秒）；grant 寿命~1h，20min 留 3x 余量
browser_token_ids = "23"          # 保活的 token id 列表（逗号分隔）
browser_profile_base = "/opt/flow2api-profiles"  # 每号子目录 = {token_id}
browser_proxy = "http://127.0.0.1:7890"          # mihomo 固定住宅 IP（必须和登录时一致）
browser_display = ":10"           # 复用现有 Xvfb（systemd 已起，PID 2041）
browser_settle_seconds = 8.0      # 导航后等 OAuth 静默续期的秒数
