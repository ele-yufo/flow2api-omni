[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[flow]
labs_base_url = "https://labs.google/fx/api"
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
timeout = 120
max_retries = 3
image_request_timeout = 40
image_timeout_retry_count = 1
image_timeout_retry_delay = 0.8
image_timeout_use_media_proxy_fallback = true
image_prefer_media_proxy = false
# 在打码浏览器内 JS fetch 提交 Flow 请求。
# 实测中 Google 仍会以 UNUSUAL_ACTIVITY 拒绝，且引入 CORS / tab 生命周期等不稳定因素，
# 默认关闭；统一使用 HTTP 客户端 + 真实浏览器指纹 + chrome110 impersonate 提交。
browser_submit_enabled = false
# 浏览器内提交失败时是否回退到 HTTP 客户端（开启 browser_submit_enabled 时建议保持 true）。
browser_submit_fallback_enabled = true
image_slot_wait_timeout = 480
image_launch_soft_limit = 20
image_launch_wait_timeout = 480
image_launch_stagger_ms = 0
video_slot_wait_timeout = 480
video_launch_soft_limit = 20
video_launch_wait_timeout = 480
video_launch_stagger_ms = 0
poll_interval = 3.0
max_poll_attempts = 200

[server]
host = "0.0.0.0"
port = 8000
# 同源管理页面无需配置。跨域控制台或 Chrome 扩展需填写浏览器实际 Origin；禁止 "*"。
# 也可用 FLOW2API_CORS_ALLOWED_ORIGINS 逗号分隔覆盖，例如 chrome-extension://<扩展ID>。
cors_allowed_origins = []

[debug]
enabled = false
log_requests = true
log_responses = true
mask_token = true
log_max_bytes = 52428800
log_backup_count = 5

[proxy]
proxy_enabled = false
proxy_url = ""

[generation]
image_timeout = 300
video_timeout = 1500

[call_logic]
call_mode = "default"  # default=随机轮询策略, polling=顺序轮询策略
# 负载均衡时跳过剩余额度 <= 此值的账号（Pro 账号额度耗尽自动跳过）
min_credits_to_select = 20

[admin]
error_ban_threshold = 3
# Discord 运维告警 webhook URL。优先读环境变量 FLOW2API_ALERT_WEBHOOK_URL（密钥不进 git），留空则只记日志
alert_webhook_url = ""
# 可用账号池低水位阈值：活跃账号数 <= 此值时触发 Discord 告警
alert_pool_low_threshold = 2

[cache]
enabled = false
timeout = 7200  # 缓存超时时间(秒), 默认2小时; 设置为0表示不自动删除缓存
base_url = ""   # 缓存文件访问的基础URL, 留空则使用服务器地址

[watermark]
# Pro(TIER_ONE) 视频去水印: 调本机常驻 ProPainter 服务(见 dewatermark/README.md)
enabled = false                          # 开关; 需先起 dewatermark 服务再设 true
service_url = "http://127.0.0.1:18290"   # 去水印服务地址(仅本机)
timeout_seconds = 120                    # 单条视频去水印超时(秒); 超时/失败则回退原视频

[captcha]
captcha_method = "browser"  # 打码方式: yescaptcha/browser/personal/remote_browser
browser_recaptcha_settle_seconds = 3.0  # reload/clr 就绪后的额外稳态等待
browser_count = 1  # browser 模式的有头浏览器实例数量
personal_project_pool_size = 4  # personal 模式下单个 Token 默认维护的项目池数量（仅影响项目轮换，不决定打码标签页数量）
personal_max_resident_tabs = 5  # personal 模式共享打码标签页上限，所有 Token/project 共用这组 tab
personal_idle_tab_ttl_seconds = 600  # personal 模式标签页空闲回收时间(秒)
yescaptcha_api_key = ""  # YesCaptcha API密钥
yescaptcha_base_url = "https://api.yescaptcha.com"
remote_browser_base_url = ""  # 远程有头打码服务地址
remote_browser_api_key = ""   # 远程有头打码服务 API Key
remote_browser_timeout = 60   # 远程有头打码请求超时(秒)

[token]
# 旧版 HTTP ST 巡检；浏览器 supervisor 启用时由数据库 token_lifecycle desired state 接管。
st_keepalive_enabled = true
st_keepalive_interval_hours = 24
# 旧版共享浏览器刷新机制存在多账号写错号风险，仅保留兼容读取，默认关闭。
st_browser_refresh_enabled = false

[keepalive]
# 主机级浏览器保活策略。每个账号的启用状态和 persistent/warm 模式存于 token_lifecycle。
browser_enabled = false
# 仅用于旧部署首次迁移/bootstrap；迁移完成后由数据库动态管理，不作为运行时账号列表。
browser_token_ids = ""
browser_interval_seconds = 1200
browser_initial_delay_seconds = 120
browser_retired_interval_seconds = 43200
browser_reconcile_interval_seconds = 15
browser_max_concurrent_refreshes = 1
browser_max_concurrent_launches = 1
browser_retry_base_seconds = 60
browser_retry_max_seconds = 1800
browser_human_retry_seconds = 21600
browser_profile_base = "/opt/flow2api-profiles"
browser_proxy = "http://127.0.0.1:7890"
browser_display = ":10"
browser_settle_seconds = 8.0
onboarding_display = ":11"
onboarding_session_ttl_seconds = 1800
# Chrome 可执行文件由宿主环境变量 BROWSER_EXECUTABLE_PATH 配置，默认 /usr/bin/google-chrome-stable。
